services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gpvalise
      POSTGRES_USER: gpvalise
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpvalise -d gpvalise"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - .env.docker  # F-022 — était .env (local/debug/sandbox)
    volumes:
      - .:/var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan horizon
    env_file:
      - .env.docker  # F-022
    volumes:
      - .:/var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  scheduler:
    # F-023 — service scheduler absent du compose prod
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: sh -c "while true; do php artisan schedule:run --no-interaction 2>&1; sleep 60; done"
    env_file:
      - .env.docker
    volumes:
      - .:/var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: always

  backup:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    # Backup quotidien à 02h00 UTC — rotation 30 jours incluse dans le script
    command: sh -c "while true; do hour=$(date +%H); min=$(date +%M); if [ \"$$hour\" = '02' ] && [ \"$$min\" = '00' ]; then sh scripts/backup.sh; sleep 61; else sleep 30; fi; done"
    env_file:
      - .env.docker
    volumes:
      - .:/var/www
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  pgdata: