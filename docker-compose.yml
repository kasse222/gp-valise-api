
services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gpvalise_app
    restart: unless-stopped
    volumes:
      - .:/var/www:cached
      - .env.docker:/var/www/.env
    env_file:
      - .env.docker
    user: "${HOST_UID}:${HOST_GID}"
    environment:
      HOST_UID: ${HOST_UID}
      HOST_GID: ${HOST_GID}
    depends_on:
      - mysql
    networks:
      - gpvalise

  nginx:
    image: nginx:stable-alpine
    container_name: gpvalise_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www:ro,z
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro,z
    depends_on:
      - app
    networks:
      - gpvalise


  redis:
    image: redis:7-alpine
    container_name: gp-valise-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - gpvalise

  mysql:
    image: mysql:8.0
    container_name: gpvalise_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gpvalise
      MYSQL_USER: gpvalise_user
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - gpvalise

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: gpvalise_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: gpvalise_user
      PMA_PASSWORD: secret
    depends_on:
      - mysql
    networks:
      - gpvalise
  
  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gpvalise_horizon
    restart: unless-stopped
    volumes:
      - .:/var/www:cached
      - .env.docker:/var/www/.env
    env_file:
      - .env.docker
    depends_on:
      - redis
      - mysql
    command: php artisan horizon
    networks:
      - gpvalise

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gpvalise_scheduler
    restart: unless-stopped
    volumes:
      - .:/var/www:cached
      - .env.docker:/var/www/.env
    env_file:
      - .env.docker
    depends_on:
      - mysql
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    networks:
      - gpvalise

  test_runner:
    image: gp-valise-api-app
    container_name: gpvalise_test_runner
    profiles: ["test"]
    working_dir: /var/www
    entrypoint: /bin/sh
    volumes:
      - .:/var/www:cached
      - .env.testing:/var/www/.env
    command: ["-c", "php artisan config:clear && ./vendor/bin/pest"]
    environment:
      APP_ENV: testing
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    networks:
      - gpvalise

volumes:
  db_data:

networks:
  gpvalise:
    driver: bridge
