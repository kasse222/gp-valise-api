services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gpvalise_app
    restart: unless-stopped
    volumes:
      - .:/var/www:cached
      - .env.docker:/var/www/.env
    env_file:
      - .env.docker
    user: "${HOST_UID}:${HOST_GID}"
    environment:
      HOST_UID: ${HOST_UID}
      HOST_GID: ${HOST_GID}
    depends_on:
      - postgres
    networks:
      - gpvalise

  nginx:
    image: nginx:stable-alpine
    container_name: gpvalise_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www:ro,z
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro,z
    depends_on:
      - app
    networks:
      - gpvalise

  redis:
    image: redis:7-alpine
    container_name: gp-valise-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - gpvalise

  postgres:
    image: postgres:16-alpine
    container_name: gpvalise_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gpvalise
      POSTGRES_USER: gpvalise_user
      POSTGRES_PASSWORD: secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - gpvalise

  pgadmin:
    image: dpage/pgadmin4
    container_name: gpvalise_pgadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gpvalise.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    networks:
      - gpvalise

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gpvalise_horizon
    restart: unless-stopped
    volumes:
      - .:/var/www:cached
      - .env.docker:/var/www/.env
    env_file:
      - .env.docker
    depends_on:
      - redis
      - postgres
    command: php artisan horizon
    networks:
      - gpvalise

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gpvalise_scheduler
    restart: unless-stopped
    volumes:
      - .:/var/www:cached
      - .env.docker:/var/www/.env
    env_file:
      - .env.docker
    depends_on:
      - postgres
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    networks:
      - gpvalise

  test_runner:
    image: gp-valise-api-app
    container_name: gpvalise_test_runner
    profiles: ["test"]
    working_dir: /var/www
    entrypoint: /bin/sh
    volumes:
      - .:/var/www:cached
      - .env.testing:/var/www/.env
    command: ["-c", "php artisan config:clear && ./vendor/bin/pest"]
    environment:
      APP_ENV: testing
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    networks:
      - gpvalise

volumes:
  pg_data:

networks:
  gpvalise:
    driver: bridge